<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
</head>
<body>
    <h1>Clearing localStorage...</h1>
    <script>
        localStorage.clear();
        sessionStorage.clear();
        document.write('<p>Storage cleared! <a href="/">Go to homepage</a></p>');
    </script>
</body>
</html>
