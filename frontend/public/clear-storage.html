<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Storage - AstraMark</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            font-size: 32px;
        }
        .status {
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 18px;
        }
        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }
        .status.warning {
            background: #fff3e0;
            color: #f57c00;
            border-left: 4px solid #f57c00;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.3s;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .token-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        .step {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .step-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clear Browser Storage</h1>
        
        <div class="status info" id="status">
            <strong>Current Status:</strong> Checking storage...
        </div>

        <div class="token-info" id="tokenInfo">
            Loading token information...
        </div>

        <button onclick="clearStorage()" id="clearBtn">
            🗑️ Clear All Storage & Reload
        </button>

        <button onclick="checkStorage()" id="checkBtn">
            🔍 Check Storage Status
        </button>

        <button onclick="goToLogin()" id="loginBtn">
            🔐 Go to Login Page
        </button>

        <div class="step">
            <span class="step-number">1</span>
            <strong>Click "Clear All Storage"</strong> to remove old tokens
        </div>

        <div class="step">
            <span class="step-number">2</span>
            <strong>Page will reload automatically</strong>
        </div>

        <div class="step">
            <span class="step-number">3</span>
            <strong>Login with fresh credentials</strong>
        </div>

        <div class="step">
            <span class="step-number">4</span>
            <strong>Test payment flow</strong> (Upgrade → Pro → Razorpay)
        </div>
    </div>

    <script>
        function checkStorage() {
            const userToken = localStorage.getItem('user_token');
            const refreshToken = localStorage.getItem('refresh_token');
            
            const statusDiv = document.getElementById('status');
            const tokenInfoDiv = document.getElementById('tokenInfo');
            
            if (!userToken && !refreshToken) {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '<strong>✅ Storage is clean!</strong> No tokens found. Ready for fresh login.';
                tokenInfoDiv.innerHTML = '<strong>No tokens in storage</strong><br>You can now login with fresh credentials.';
            } else {
                statusDiv.className = 'status warning';
                statusDiv.innerHTML = '<strong>⚠️ Old tokens found!</strong> Click "Clear All Storage" to remove them.';
                
                let info = '';
                if (userToken) {
                    info += '<strong>Access Token:</strong> ' + userToken.substring(0, 50) + '...<br>';
                }
                if (refreshToken) {
                    info += '<strong>Refresh Token:</strong> ' + refreshToken.substring(0, 50) + '...';
                }
                tokenInfoDiv.innerHTML = info;
            }
        }

        function clearStorage() {
            const confirmClear = confirm('This will clear all stored tokens and reload the page. Continue?');
            
            if (confirmClear) {
                // Clear localStorage
                localStorage.clear();
                
                // Clear sessionStorage
                sessionStorage.clear();
                
                // Clear cookies (if any)
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                
                alert('✅ Storage cleared! Page will reload now.');
                
                // Reload page
                window.location.href = '/';
            }
        }

        function goToLogin() {
            window.location.href = '/login';
        }

        // Check storage on page load
        window.onload = function() {
            checkStorage();
        };
    </script>
</body>
</html>
