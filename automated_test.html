<!DOCTYPE html>
<html>
<head>
    <title>AstraMark Automated Test Suite</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 { 
            text-align: center; 
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 30px;
        }
        .test-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 4px solid #00ff88;
        }
        .test-section h2 {
            color: #00ff88;
            margin-top: 0;
        }
        button { 
            padding: 12px 24px; 
            margin: 10px 5px; 
            font-size: 16px; 
            cursor: pointer;
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,255,136,0.5);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .log { 
            background: #000; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 5px;
            border-left: 3px solid #00ff88;
            font-size: 14px;
            line-height: 1.6;
        }
        .error { color: #ff4444; border-left-color: #ff4444; }
        .success { color: #00ff88; border-left-color: #00ff88; }
        .info { color: #00d4ff; border-left-color: #00d4ff; }
        .warning { color: #ffaa00; border-left-color: #ffaa00; }
        #logs {
            max-height: 500px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .progress {
            width: 100%;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88 0%, #00d4ff 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid rgba(0,255,136,0.3);
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }
        .stat-label {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AstraMark Automated Test Suite</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTests">0</div>
                <div class="stat-label">Total Tests</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="passedTests">0</div>
                <div class="stat-label">Passed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failedTests">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="duration">0s</div>
                <div class="stat-label">Duration</div>
            </div>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>
        
        <div class="test-section">
            <h2>🎯 Test Controls</h2>
            <button onclick="runAllTests()" id="runAllBtn">▶️ Run All Tests</button>
            <button onclick="runAuthTests()">🔐 Auth Tests Only</button>
            <button onclick="runPaymentTests()">💳 Payment Tests Only</button>
            <button onclick="clearLogs()">🗑️ Clear Logs</button>
            <button onclick="openAstraMark()">🌐 Open AstraMark</button>
        </div>

        <div class="test-section">
            <h2>📊 Test Results</h2>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        const BACKEND = 'http://localhost:8001';
        let testStats = { total: 0, passed: 0, failed: 0 };
        let startTime;

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            div.innerHTML = `<strong>[${timestamp}]</strong> ${msg}`;
            document.getElementById('logs').appendChild(div);
            document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
            console.log(msg);
        }

        function updateStats() {
            document.getElementById('totalTests').textContent = testStats.total;
            document.getElementById('passedTests').textContent = testStats.passed;
            document.getElementById('failedTests').textContent = testStats.failed;
            
            if (startTime) {
                const duration = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('duration').textContent = duration + 's';
            }
        }

        function updateProgress(current, total) {
            const percent = (current / total * 100).toFixed(0);
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percent + '%';
            progressBar.textContent = percent + '%';
        }

        async function runTest(name, testFn) {
            testStats.total++;
            updateStats();
            
            try {
                log(`🧪 Running: ${name}`, 'info');
                await testFn();
                testStats.passed++;
                log(`✅ PASSED: ${name}`, 'success');
                return true;
            } catch (error) {
                testStats.failed++;
                log(`❌ FAILED: ${name} - ${error.message}`, 'error');
                return false;
            } finally {
                updateStats();
            }
        }

        async function testServerHealth() {
            const response = await fetch(`${BACKEND}/health`);
            if (!response.ok) throw new Error('Server health check failed');
            const data = await response.json();
            if (data.status !== 'healthy') throw new Error('Server not healthy');
            log(`   Server status: ${data.status}`, 'info');
        }

        async function testUserRegistration() {
            const email = `test${Date.now()}@example.com`;
            const response = await fetch(`${BACKEND}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: 'TestPassword123!',
                    full_name: 'Automated Test User'
                })
            });
            
            if (!response.ok) {
                const data = await response.json();
                if (data.detail && data.detail.includes('already exists')) {
                    log(`   User already exists, using existing account`, 'warning');
                    return;
                }
                throw new Error(`Registration failed: ${JSON.stringify(data)}`);
            }
            
            log(`   Registered user: ${email}`, 'info');
            localStorage.setItem('test_email', email);
        }

        async function testUserLogin() {
            const email = localStorage.getItem('test_email') || 'test@example.com';
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', 'TestPassword123!');
            
            const response = await fetch(`${BACKEND}/api/auth/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            
            if (!response.ok) {
                throw new Error('Login failed');
            }
            
            const data = await response.json();
            if (!data.access_token || !data.refresh_token) {
                throw new Error('Missing tokens in response');
            }
            
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('refresh_token', data.refresh_token);
            log(`   Access token: ${data.access_token.substring(0, 20)}...`, 'info');
            log(`   Refresh token: ${data.refresh_token.substring(0, 20)}...`, 'info');
        }

        async function testTokenValidation() {
            const token = localStorage.getItem('access_token');
            if (!token) throw new Error('No access token found');
            
            const response = await fetch(`${BACKEND}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!response.ok) {
                const data = await response.json();
                throw new Error(`Token validation failed: ${JSON.stringify(data)}`);
            }
            
            const data = await response.json();
            log(`   Validated user: ${data.email}`, 'info');
        }

        async function testTokenRefresh() {
            const refreshToken = localStorage.getItem('refresh_token');
            if (!refreshToken) throw new Error('No refresh token found');
            
            const response = await fetch(`${BACKEND}/api/auth/refresh`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: refreshToken })
            });
            
            if (!response.ok) {
                const data = await response.json();
                throw new Error(`Token refresh failed: ${JSON.stringify(data)}`);
            }
            
            const data = await response.json();
            if (!data.access_token) {
                throw new Error('No new access token in response');
            }
            
            localStorage.setItem('access_token', data.access_token);
            log(`   New access token: ${data.access_token.substring(0, 20)}...`, 'info');
        }

        async function testRazorpayOrderCreation() {
            const token = localStorage.getItem('access_token');
            if (!token) throw new Error('No access token found');
            
            const response = await fetch(`${BACKEND}/api/payments/razorpay/create-order`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ plan_id: 'pro' })
            });
            
            if (!response.ok) {
                const data = await response.json();
                throw new Error(`Order creation failed: ${JSON.stringify(data)}`);
            }
            
            const data = await response.json();
            log(`   Order created: ${data.order_id || 'success'}`, 'info');
        }

        async function testPaymentAfterRefresh() {
            // First refresh the token
            await testTokenRefresh();
            
            // Then try to create an order with the new token
            await testRazorpayOrderCreation();
            
            log(`   Payment flow after refresh: SUCCESS`, 'info');
        }

        async function testConsecutiveAuthCalls() {
            const token = localStorage.getItem('access_token');
            if (!token) throw new Error('No access token found');
            
            // Make 3 consecutive calls to /auth/me
            for (let i = 1; i <= 3; i++) {
                const response = await fetch(`${BACKEND}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    throw new Error(`Call ${i} failed`);
                }
            }
            
            log(`   3 consecutive auth calls: SUCCESS`, 'info');
        }

        async function testInvalidToken() {
            const response = await fetch(`${BACKEND}/api/auth/me`, {
                headers: { 'Authorization': 'Bearer invalid.token.here' }
            });
            
            if (response.ok) {
                throw new Error('Invalid token was accepted!');
            }
            
            log(`   Invalid token correctly rejected`, 'info');
        }

        async function runAuthTests() {
            log('🔐 Starting Authentication Tests...', 'info');
            startTime = Date.now();
            testStats = { total: 0, passed: 0, failed: 0 };
            
            const tests = [
                ['Server Health Check', testServerHealth],
                ['User Registration', testUserRegistration],
                ['User Login', testUserLogin],
                ['Token Validation (/auth/me)', testTokenValidation],
                ['Token Refresh', testTokenRefresh],
                ['Token Validation After Refresh', testTokenValidation],
                ['Consecutive Auth Calls', testConsecutiveAuthCalls],
                ['Invalid Token Rejection', testInvalidToken]
            ];
            
            for (let i = 0; i < tests.length; i++) {
                updateProgress(i, tests.length);
                await runTest(tests[i][0], tests[i][1]);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            updateProgress(tests.length, tests.length);
            log(`\n🎉 Authentication Tests Complete!`, 'success');
            log(`   Passed: ${testStats.passed}/${testStats.total}`, testStats.failed === 0 ? 'success' : 'warning');
        }

        async function runPaymentTests() {
            log('💳 Starting Payment Tests...', 'info');
            startTime = Date.now();
            testStats = { total: 0, passed: 0, failed: 0 };
            
            // Ensure we're logged in first
            if (!localStorage.getItem('access_token')) {
                await runTest('Login for Payment Tests', testUserLogin);
            }
            
            const tests = [
                ['Razorpay Order Creation', testRazorpayOrderCreation],
                ['Payment After Token Refresh', testPaymentAfterRefresh],
                ['Multiple Payment Requests', async () => {
                    await testRazorpayOrderCreation();
                    await testRazorpayOrderCreation();
                }]
            ];
            
            for (let i = 0; i < tests.length; i++) {
                updateProgress(i, tests.length);
                await runTest(tests[i][0], tests[i][1]);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            updateProgress(tests.length, tests.length);
            log(`\n🎉 Payment Tests Complete!`, 'success');
            log(`   Passed: ${testStats.passed}/${testStats.total}`, testStats.failed === 0 ? 'success' : 'warning');
        }

        async function runAllTests() {
            document.getElementById('runAllBtn').disabled = true;
            clearLogs();
            
            log('🚀 Starting Complete Test Suite...', 'info');
            log('═══════════════════════════════════════', 'info');
            
            await runAuthTests();
            
            log('\n═══════════════════════════════════════', 'info');
            
            await runPaymentTests();
            
            log('\n═══════════════════════════════════════', 'info');
            log(`\n🏁 ALL TESTS COMPLETE!`, 'success');
            log(`   Total: ${testStats.total} | Passed: ${testStats.passed} | Failed: ${testStats.failed}`, 
                testStats.failed === 0 ? 'success' : 'error');
            
            if (testStats.failed === 0) {
                log(`\n✨ Perfect! All tests passed! Token validation fix is working correctly! ✨`, 'success');
            } else {
                log(`\n⚠️ Some tests failed. Please review the errors above.`, 'warning');
            }
            
            document.getElementById('runAllBtn').disabled = false;
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            testStats = { total: 0, passed: 0, failed: 0 };
            updateStats();
            updateProgress(0, 100);
        }

        function openAstraMark() {
            window.open('http://localhost:3000', '_blank');
            log('🌐 Opening AstraMark in new tab...', 'info');
        }

        // Auto-run tests on load
        window.onload = () => {
            log('🎯 Automated Test Suite Ready!', 'success');
            log('   Backend: ' + BACKEND, 'info');
            log('   Click "Run All Tests" to start automated testing', 'info');
            log('\n💡 Tip: Tests will verify the token validation fix is working correctly', 'info');
        };
    </script>
</body>
</html>
