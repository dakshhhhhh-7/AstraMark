version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: astramark-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: astramark_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - astramark-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: astramark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astramark-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astramark-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://admin:password123@mongodb:27017/astramark_dev?authSource=admin
      - DB_NAME=astramark_dev
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - ENVIRONMENT=development
      - DEBUG=true
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - astramark-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astramark-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - astramark-network

volumes:
  mongodb_data:
  redis_data:

networks:
  astramark-network:
    driver: bridge